services:
  payments-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudgames-Payment
    ports:
      - "5058:5058"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5058"
      APPLICATIONINSIGHTS_CONNECTION_STRING: ""

      Jwt__Key: "chave-secreta-super-forte-123456"
      Jwt__Issuer: "CloudGamesAPI"
      Jwt__Audience: "CloudGamesAPIClient"

      # Service Bus Connection String - MUST be from NAMESPACE level (not topic level)
      # Get it from: Azure Portal → Service Bus Namespace → Settings → Shared access policies
      # Format: Endpoint=sb://YOUR-NAMESPACE.servicebus.windows.net/;SharedAccessKeyName=...;SharedAccessKey=...
      # WARNING: String must be on ONE line, no line breaks! Should NOT contain EntityPath=
      ServiceBus__ConnectionString: ""
      ServiceBus__OrderPlacedTopicName: "order-placed"
      ServiceBus__OrderPlacedSubscriptionName: "payments-api"
      ServiceBus__PaymentProcessedTopicName: "payment-processed"

    networks:
      - cloudgames-network

networks:
  cloudgames-network:
    external: true
