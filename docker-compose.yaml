services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cloudgames-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cloudgames-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payments-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudgames-Payment
    ports:
      - "5055:5055"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5055"

      RabbitMq__HostName: "cloudgames-rabbitmq" 
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__ExchangeName: "cloudgames.topic"
      RabbitMq__QueueNameOrderPlaced: "OrderPlacedEvent"
      RabbitMq__QueueNamePaymentProcessed: "PaymentProcessedEvent"

    networks:
      - cloudgames-network

networks:
  cloudgames-network:
    driver: bridge
    name: cloudgames-network

volumes:
  rabbitmq_data: