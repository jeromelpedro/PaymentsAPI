services:
  payments-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudgames-Payment
    ports:
      - "5058:5058"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5058"
      APPLICATIONINSIGHTS_CONNECTION_STRING: ""

      Jwt__Key: "chave-secreta-super-forte-123456"
      Jwt__Issuer: "CloudGamesAPI"
      Jwt__Audience: "CloudGamesAPIClient"

      ServiceBus__ConnectionString: ""
      ServiceBus__OrderPlacedTopicName: "order-placed"
      ServiceBus__OrderPlacedSubscriptionName: "payments-api"
      ServiceBus__PaymentProcessedTopicName: "payment-processed"

    networks:
      - cloudgames-network

networks:
  cloudgames-network:    
    external: true